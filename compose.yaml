# b2b-saas-workspace/compose.yaml
# Docker Compose file

name: b2b-saas-infra

services:
  postgres:
    image: postgres:17-alpine
    container_name: b2b-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: peaky0501
      POSTGRES_DB: b2b_saas
      TZ: Asia/Seoul
    volumes:
      - b2b-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d b2b_saas"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:8-alpine
    container_name: b2b-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Seoul
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - b2b-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  b2b-postgres-data:
    name: b2b-postgres-data-volume
  b2b-redis-data:
    name: b2b-redis-data-volume