# Workflow Name
name: B2B SaaS API CI

# Event Trigger
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Jobs
jobs:
  build-and-test:
    # Job 실행 환경
    runs-on: ubuntu-latest
    
    # Job 실행 단계
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @b2b/database db:generate

      - name: Run Linter
        run: pnpm run lint
      
      - name: Run Type Check
        run: pnpm run check-types

      - name: Build Application
        run: pnpm run build

      - name: Run Unit Tests
        run: pnpm --filter api test

        # TODO: 현재 더미값 사용 중이므로 Secret 사용하여 실제 값 주입할 것
      - name: Run E2E Tests
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/b2b_saas?schema=public"
          JWT_ACCESS_SECRET: "ci_test_jwt_access_secret_key_12345!"
        run: pnpm --filter run api test:e2e